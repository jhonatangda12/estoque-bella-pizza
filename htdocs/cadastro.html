<style> 
/* Remove o olho nativo do Edge/Chrome */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
  display: none;
}


    .input-senha{
      display: flex;
      width: auto;
      border: none;
      all: unset; /* remove praticamente todos os estilos herdados */
      text-align: start;


    }
    .borda-div-input{
      display: flex;
      align-items: center;
      border: 1px solid #712cf9;
      border-radius: 5px;
      width: 300px;
      height: 30px;
      justify-content: space-between;
      padding: 3px;
    }   
    .div-input{
      display: flex;
      align-items: center;
      box-sizing: border-box;
      border: 1px solid gray;
      border-radius: 5px;
      width: 300px;
      height: 30px;
      justify-content: space-between;
      padding: 3px;
    }
    .toggleL{
        display: flex;
        justify-content:flex-end;
        align-items:center ;
        width: 50px;
        height: 20px;
        background-color: green;
        border-color: none;
        border-radius: 20px;
        border: 2px;
        box-sizing: border-box;
        padding:0 ;
        margin: 0;
    }
    .toggleD{
        display: flex;
        justify-content:flex-start;
        align-items:center ;
        width: 50px;
        height: 20px;
        background-color: gray;
        border-color: none;
        border-radius: 20px;
        border: 2px;
        box-sizing: border-box;
        padding:0 ;
        margin: 0;
    }    
    .esfera{
        width: 20px;
        height: 20px;
        background-color: #712cf9;
        border-color: none;
        border-radius: 100%;
        border: 2px;
        box-sizing: border-box;
    }
</style>
<br><br>

 <button class="button-class-entrada-saida" type="submit">Salvar<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" class="bi bi-airplane-fill" viewbox="0 0 16 16"> <path d="M6.428 1.151C6.708.591 7.213 0 8 0s1.292.592 1.572 1.151C9.861 1.73 10 2.431 10 3v3.691l5.17 2.585a1.5 1.5 0 0 1 .83 1.342V12a.5.5 0 0 1-.582.493l-5.507-.918-.375 2.253 1.318 1.318A.5.5 0 0 1 10.5 16h-5a.5.5 0 0 1-.354-.854l1.319-1.318-.376-2.253-5.507.918A.5.5 0 0 1 0 12v-1.382a1.5 1.5 0 0 1 .83-1.342L6 6.691V3c0-.568.14-1.271.428-1.849"></path> </svg> </button></form>
    <script>
    /*function borda() {
  var liga = document.getElementById('liga-b');//seleciona o elemento com o id toggle
  liga.className='borda-div-input'  
    }*/
    function toggle() {
  var desligado = document.getElementById('toggle');//seleciona o elemento com o id toggle
  desligado.className = desligado.className === "toggleD" ? "toggleL" : "toggleD";
  //desligado.className → pega a classe atual do elemento com id "toggle".
//=== "toggleD" → verifica se a classe atual é "toggleD".
//? "toggleL" : "toggleD" → se for "toggleD", troca para "toggleL". Caso contrário, volta para "toggleD".
            
}
        
//torna senha visível
function mostrarSenha() {
  var campo = document.getElementById("senha");
  if (campo.type === "password") {
    campo.type = "text";
  } else {
    campo.type = "password";
  }
}</script>
